<!doctype html>
<html lang="ja">
  <!--headは、画面に表示されない情報を書く-->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--<meta name="robots" content="noindex" />
      検索エンジンを制御、検索結果に出ないようにする-->
    <meta name="robots" content="noindex" />
    <title>recipe</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!--ヘッダー-->
    <header>
      <div>
        <img
          src="img/logo_white.webp"
          alt="Kitchen Labのロゴ画像"
          width="214"
          height="55"
        />
        <nav>
          <ul>
            <li><a href="">ABOUT US</a></li>
            <li><a href="">COURSE</a></li>
            <li><a href="">CONTACT</a></li>
          </ul>
        </nav>
      </div>
      <a href="https://lin.ee/8rYRCmu" class="button header-button"
        >体験レッスンお申込み</a
      >
    </header>

    <!-- メインコンテンツ -->
    <main>
      <section class="recipe">
        <div class="recipe-inner">
          <div class="recipe-contents">
            <div class="recipe-detail">
              <h1 class="recipe-title">
                失敗しない！<br />ローストビーフの作り方
              </h1>
              <div class="recipe-wrap">
                <h2 class="recipe-heading">材料</h2>
                <ul class="recipe-description">
                  <li>牛ももの塊肉(400～500gくらい)</li>
                  <li>塩(小さじ1弱)</li>
                  <li>こしょう(適量)</li>
                  <li>オリーブオイル(大さじ1)</li>
                </ul>
              </div>
              <div class="recipe-wrap">
                <h2 class="recipe-heading">作り方</h2>
                <ol class="recipe-description">
                  <li>
                    冷蔵庫から出して、塩こしょうをまぶし常温で１時間前おく。
                  </li>
                  <li>
                    フライパンにオリーブオイルを入れて熱し、焼き色をつける。
                  </li>
                  <li>
                    粗熱が取れたら、ラップで２重にくるみ、さらにアルミホイルで巻く。
                  </li>
                </ol>
              </div>
            </div>
            <div class="recipe-image">
              <img
                src="img/img_recipe--roast-beef.webp"
                alt="野菜やソースと盛り付けられたローストビーフ"
                width="707"
                height="500"
              />
            </div>
          </div>
          <div class="recipe-video-button">
            <a href="" class="button recipe-button">レシピ動画</a>
          </div>
        </div>
      </section>
    </main>

    <!--フッター-->
    <footer>
      <div class="copy">&copy;Kitchen Lab All rights reserved</div>
    </footer>
  </body>
</html>
